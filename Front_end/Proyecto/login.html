<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TransFleet | Login</title>

    <!-- Google Fonts: Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link rel="stylesheet" href="css/login.css">
</head>
<body class="login-page">
    <div class="background-animation">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
        <div class="blob blob-3"></div>
    </div>

    <div class="login-container glass-panel">
        <div class="login-box">
            <!-- Logo/Header -->
            <div class="login-header fade-in">
                <div class="logo-wrapper">
                    <img src="img/logo.jpeg" alt="Premium Services" class="floating-logo"/>
                </div>
                <h1>Bienvenido a <br><span class="text-gradient">TransFleet</span></h1>
                <p class="subtitle">Gestión Logística Inteligente y Simplificada.</p>
            </div>

            <!-- Formulario de Login -->
            <form id="loginForm" class="login-form slide-up">
                <div class="input-group-custom mb-4">
                    <div class="input-icon">
                        <i class="bi bi-envelope"></i>
                    </div>
                    <input 
                        type="email" 
                        class="form-control-custom" 
                        id="email" 
                        placeholder="tu@correo.com"
                        required
                    >
                    <div class="focus-border"></div>
                </div>

                <div class="input-group-custom mb-4">
                    <div class="input-icon">
                        <i class="bi bi-lock"></i>
                    </div>
                    <input 
                        type="password" 
                        class="form-control-custom" 
                        id="password" 
                        placeholder="Contraseña segura"
                        required
                    >
                    <button type="button" class="btn-toggle-password" id="togglePassword">
                        <i class="bi bi-eye"></i>
                    </button>
                    <div class="focus-border"></div>
                </div>

                <!-- Opciones adicionales -->
                <div class="form-options mb-4 mb-lg-5 fade-in-delay">
                    <label class="custom-checkbox">
                        <input type="checkbox" id="rememberMe">
                        <span class="checkmark"></span>
                        <span class="label-text">Recuérdame</span>
                    </label>
                    <a href="#" class="forgot-password">Ayuda con mi clave</a>
                </div>

                <!-- Botón de Login -->
                <button type="submit" class="btn btn-login-glow w-100 bounce-on-hover">
                    <span id="btnText">Acceder al Sistema</span>
                    <i class="bi bi-arrow-right-short ms-2 fs-4"></i>
                    <span id="btnSpinner" class="spinner-border spinner-border-sm ms-2" style="display: none;"></span>
                </button>

                <!-- Alertas -->
                <div id="alertContainer"></div>
            </form>

            <!-- Divider -->
            <div class="divider fade-in-delay-2">
                <span>INGRESO RÁPIDO</span>
            </div>

            <div class="social-login fade-in-delay-2">
                <button type="button" class="btn-social bounce-on-hover" title="Google">
                    <i class="bi bi-google"></i>
                </button>
                <button type="button" class="btn-social bounce-on-hover" title="Microsoft">
                    <i class="bi bi-windows"></i>
                </button>
            </div>
        </div>

        <!-- Lado derecho interactivo -->
        <div class="login-showcase">
            <div class="showcase-content slide-left">
                <div class="glass-card feature-highlight float-animation-1">
                    <div class="icon-circle"><i class="bi bi-geo-alt"></i></div>
                    <div>
                        <h5>Rastreo en Tiempo Real</h5>
                        <p>Visualiza cada viaje al segundo.</p>
                    </div>
                </div>
                <div class="glass-card feature-highlight float-animation-2">
                    <div class="icon-circle bg-purple"><i class="bi bi-graph-up-arrow"></i></div>
                    <div>
                        <h5>Analíticas Avanzadas</h5>
                        <p>Métricas que escalan tu negocio.</p>
                    </div>
                </div>
            </div>
            <div class="overlay-gradient"></div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/config.js"></script>
    <script src="js/login.js"></script>
</body>
</html>
