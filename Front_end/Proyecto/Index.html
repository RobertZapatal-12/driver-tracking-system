<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <title>
            Inventario de Vehiculos
        </title>

        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
        <link href="css/styles.css" rel="stylesheet">

    </head>

    <body>

        <div class="container-fluid">
            <div class="row g-0">
                
                <!-- SIDEBAR -->
                <div class="col-md-2" id="sidebar"></div>


                <!-- CONTENIDO -->
                <div class="col-md-10 p-4" id="contenido">
                    <h1>Panel principal</h1>
                    <p>Bienvenido al sistema de gestión de vehículos</p>

                    <div class="row mt-4">

                        <div class="col-md-3">
                            <div class="card">
                                <div class="card-body">
                                    <h5>Vehículos</h5>
                                    <p>Gestionar vehículos</p>
                                </div>
                            </div>
                        </div>

                        <div class="col-md-3">
                            <div class="card">
                                <div class="card-body">
                                    <h5>Conductores</h5>
                                    <p>Gestionar conductores</p>
                                </div>
                            </div>
                        </div>

                        <div class="col-md-3">
                            <div class="card">
                                <div class="card-body">
                                    <h5>Rutas</h5>
                                    <p>Gestionar rutas</p>
                                </div>
                            </div>
                        </div>

                        <div class="col-md-3">
                            <div class="card">
                                <div class="card-body">
                                    <h5>Solicitudes</h5>
                                    <p>Solicitudes de servicio</p>
                                </div>
                            </div>
                        </div>

                    </div>

                    <div class="row mt-4">

                        <div class="col-md-3">
                            <div class="card text-bg-primary">
                                <div class="card-body">
                                    <h5>Total Vehículos</h5>
                                    <h2>12</h2>
                                </div>
                            </div>
                        </div>

                        <div class="col-md-3">
                            <div class="card text-bg-success">
                                <div class="card-body">
                                    <h5>Disponibles</h5>
                                    <h2>7</h2>
                                </div>
                            </div>
                        </div>

                        <div class="col-md-3">
                            <div class="card text-bg-warning">
                                <div class="card-body">
                                    <h5>En uso</h5>
                                    <h2>4</h2>
                                </div>
                            </div>
                        </div>

                        <div class="col-md-3">
                            <div class="card text-bg-danger">
                                <div class="card-body">
                                    <h5>Mantenimiento</h5>
                                    <h2>1</h2>
                                </div>
                            </div>
                        </div>

                    </div>

                </div>

            </div>

        </div>
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
        <script src="Js/App.js"></script>
    
    </body>


</html>
