<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TransFleet | Gestión Logística</title>

    <!-- Google Fonts: Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">

    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />

    <!-- Estilos -->
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/vehiculos.css" />
</head>
<body class="saas-body">

    <!-- Modern SaaS Header Architecture -->
    <header class="saas-header">
        <div class="header-top">
            <div class="header-container container-xl">
                <div class="logo-area">
                    <div class="logo-icon"><i class="bi bi-truck"></i></div>
                    <span class="logo-text">TransFleet</span>
                </div>
                
                <div class="header-actions">
                    <div class="global-search d-none d-md-flex">
                        <i class="bi bi-search"></i>
                        <input type="text" placeholder="Buscar rutas, conductores...">
                    </div>
                    <button class="action-btn"><i class="bi bi-bell"></i></button>

                    <!-- SETTINGS DROPDOWN -->
                    <div class="dropdown">
                        <button class="action-btn" type="button" data-bs-toggle="dropdown" aria-expanded="false" title="Configuraciones">
                            <i class="bi bi-gear"></i>
                        </button>
                        <div class="dropdown-menu dropdown-menu-end shadow-lg border-0 tf-settings-dropdown" style="width: 280px; border-radius: 16px; padding: 16px;">
                            
                            <!-- PREFERENCIAS VISUALES -->
                            <h6 class="dropdown-header fw-bold px-2 py-1 text-primary text-uppercase" style="font-size: 0.72rem; letter-spacing: 1px;">Apariencia</h6>
                            <div class="dropdown-item px-2 py-2 d-flex justify-content-between align-items-center" style="border-radius: 8px;">
                                <span class="d-flex align-items-center" style="font-size: 0.9rem; font-weight: 500;"><i class="bi bi-moon-stars text-muted me-2"></i>Modo Oscuro</span>
                                <div class="form-check form-switch m-0 fs-5">
                                    <input class="form-check-input" type="checkbox" id="toggleDarkMode">
                                </div>
                            </div>
                            
                            <!-- PREFERENCIAS MAPA -->
                            <h6 class="dropdown-header fw-bold px-2 py-1 text-primary text-uppercase mt-3" style="font-size: 0.72rem; letter-spacing: 1px;">Mapas</h6>
                            <div class="dropdown-item px-2 py-2 d-flex justify-content-between align-items-center" style="border-radius: 8px;">
                                <span class="d-flex align-items-center" style="font-size: 0.9rem; font-weight: 500;"><i class="bi bi-map text-muted me-2"></i>Estilo Mapa</span>
                                <select class="form-select form-select-sm w-auto" id="mapStyleSelector" style="min-width: 90px; border-radius: 8px; font-weight: 500; font-size: 0.8rem; border-color: var(--tf-border);">
                                    <option value="voyager">Claro</option>
                                    <option value="dark">Oscuro</option>
                                </select>
                            </div>

                            <!-- PREFERENCIAS OPERATIVAS -->
                            <h6 class="dropdown-header fw-bold px-2 py-1 text-primary text-uppercase mt-3" style="font-size: 0.72rem; letter-spacing: 1px;">Operativo</h6>
                            <div class="dropdown-item px-2 py-2 d-flex justify-content-between align-items-center" style="border-radius: 8px;">
                                <span class="d-flex align-items-center" style="font-size: 0.9rem; font-weight: 500;"><i class="bi bi-arrow-repeat text-muted me-2"></i>Auto-refresco</span>
                                <div class="form-check form-switch m-0 fs-5">
                                    <input class="form-check-input" type="checkbox" id="toggleAutoRefresh" checked>
                                </div>
                            </div>
                            <div class="dropdown-item px-2 py-2 d-flex justify-content-between align-items-center" style="border-radius: 8px;">
                                <span class="d-flex align-items-center" style="font-size: 0.9rem; font-weight: 500;"><i class="bi bi-volume-up text-muted me-2"></i>Sonidos</span>
                                <div class="form-check form-switch m-0 fs-5">
                                    <input class="form-check-input" type="checkbox" id="toggleSounds" checked>
                                </div>
                            </div>

                            <hr class="dropdown-divider my-3 border-opacity-25">
                            
                            <!-- LOGOUT -->
                            <a class="dropdown-item px-2 py-2 text-danger d-flex align-items-center" href="#" onclick="logoutUser(); return false;" style="font-weight: 600; font-size: 0.9rem; border-radius: 8px;">
                                <i class="bi bi-box-arrow-right me-2"></i> Cerrar Sesión
                            </a>
                        </div>
                    </div>

                    <div class="user-profile">
                        <div class="avatar"><i class="bi bi-person"></i></div>
                        <span class="user-name">Admin Usuario</span>
                    </div>
                </div>
            </div>
        </div>

        <div class="header-nav-wrapper">
            <div class="header-container container-xl">
                <!-- We inject the navigation here dynamically via app.js -->
                <nav id="sidebar" class="saas-nav"></nav>
            </div>
        </div>
    </header>

    <!-- Main Content Area -->
    <div class="main-wrapper">
        <div class="container-xl">
            <div class="page-heading">
                <h2 id="page-title" class="fw-bold m-0">Dashboard</h2>
                <div class="breadcrumb text-muted fs-6">Gestión Logística / <span id="breadcrumb-current">Dashboard</span></div>
            </div>
            
            <main id="contenido" class="content-area"></main>
        </div>
    </div>

    <!-- Footer -->
    <footer class="saas-footer">
        <div class="container-xl text-center text-muted">
            <p class="mb-0">&copy; 2026 TransFleet System. Todos los derechos reservados.</p>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <!-- Scripts del proyecto -->
    <script src="js/config.js"></script>
    <script src="js/drivers.js"></script>
    <script src="js/vehiculos.js"></script>
    <script src="js/app.js"></script>
    <script src="js/rutas.js"></script>
</body>
</html>
