<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Sistema de gestión de vehículos</title>

  <!-- Bootstrap 5 -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css" />
  <style>
    body { display: flex; min-height: 100vh; margin: 0; }
    #sidebar { width: 220px; background-color: #1c2128; color: white; padding: 20px; }
    #sidebar a { color: #cfcfd0; text-decoration: none; display: block; margin-bottom: 12px; transition: color 0.3s; }
    #sidebar a:hover { color: white; }
    #contenido { flex-grow: 1; padding: 30px; background: #f8f9fa; }
    .card-clickable { cursor: pointer; transition: box-shadow 0.3s; }
    .card-clickable:hover { box-shadow: 0 4px 15px rgb(0 0 0 / 0.15); }
  </style>
</head>
<body>

  <!-- Sidebar -->
  <div id="sidebar"></div>

  <!-- Contenido principal -->
  <main id="contenido">
    <h1>Panel principal</h1>
    <p>Bienvenido al sistema de gestión de vehículos</p>

    <div class="d-flex flex-wrap gap-3 mb-4">
      <div class="card card-clickable p-3" style="min-width:180px" onclick="cargarPagina('vehiculos')">
        <strong>Vehículos</strong>
        <p class="mb-0">Gestionar vehículos</p>
      </div>
      <div class="card card-clickable p-3" style="min-width:180px" onclick="cargarPagina('conductores')">
        <strong>Conductores</strong>
        <p class="mb-0">Gestionar conductores</p>
      </div>
      <div class="card card-clickable p-3" style="min-width:180px" onclick="cargarPagina('rutas')">
        <strong>Rutas</strong>
        <p class="mb-0">Gestionar rutas</p>
      </div>
      <div class="card card-clickable p-3" style="min-width:180px" onclick="cargarPagina('solicitudes')">
        <strong>Solicitudes</strong>
        <p class="mb-0">Solicitudes de servicio</p>
      </div>
    </div>

    <div class="d-flex flex-wrap gap-3">
      <div class="card text-white bg-primary p-3" style="min-width:140px" onclick="cargarPagina('vehiculos')">
        <span>Total Vehículos</span>
        <h3>12</h3>
      </div>
      <div class="card text-white bg-success p-3" style="min-width:140px" onclick="cargarPagina('vehiculos')">
        <span>Disponibles</span>
        <h3>7</h3>
      </div>
      <div class="card text-dark bg-warning p-3" style="min-width:140px" onclick="cargarPagina('vehiculos')">
        <span>En uso</span>
        <h3>4</h3>
      </div>
      <div class="card text-white bg-danger p-3" style="min-width:140px" onclick="cargarPagina('vehiculos')">
        <span>Mantenimiento</span>
        <h3>1</h3>
      </div>
    </div>

  </main>

  <script src="js/app.js"></script>
</body>
</html>
