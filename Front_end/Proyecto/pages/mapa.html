<div class="map-wrapper d-flex flex-column" style="position: relative; height: calc(100vh - 200px); min-height: 600px; width: 100%; border-radius: 24px; background: var(--bg-main); box-shadow: var(--shadow-soft); overflow: hidden;">
    
    <!-- Mapa Base -->
    <div id="map" style="flex: 1; width: 100%; z-index: 1;"></div>

    <!-- Barra de Búsqueda Flotante -->
    <div class="map-floating-search" style="position: absolute; top: 20px; left: 20px; z-index: 1000; width: 350px;">
        <div class="glass-panel text-dark mode-fluid" style="padding: 10px; background: var(--bg-surface); opacity: 0.95; backdrop-filter: blur(10px); border-radius: 16px; border: 1px solid var(--border-color); box-shadow: 0 10px 25px rgba(0,0,0,0.1);">
            <div class="input-group">
                <span class="input-group-text bg-transparent border-0"><i class="bi bi-search text-primary"></i></span>
                <input type="text" id="codigoViaje" class="form-control border-0 bg-transparent" placeholder="ID del Conductor (Ej: 6)" style="box-shadow: none; color: var(--text-primary);">
                <button class="btn btn-primary" onclick="buscarUbicacion()" style="border-radius: 12px;">Rastrear</button>
            </div>
        </div>
    </div>

    <!-- Panel de Estado (Aparece cuando hay selección) -->
    <div id="map-info-panel" class="map-floating-info" style="position: absolute; bottom: 20px; left: 20px; right: 20px; z-index: 1000; display: none;">
        <div class="glass-panel w-100" style="padding: 20px; background: var(--bg-surface); opacity: 0.95; backdrop-filter: blur(10px); border-radius: 20px; border: 1px solid var(--border-color); box-shadow: 0 10px 40px rgba(0,0,0,0.15); display: flex; align-items: center; justify-content: space-between;">
            <div class="d-flex align-items-center gap-3">
                <div id="map-driver-img-container" style="width: 60px; height: 60px; border-radius: 15px; overflow: hidden; background: var(--border-color);">
                    <img id="map-driver-img" src="" style="width: 100%; height: 100%; object-fit: cover;">
                </div>
                <div>
                    <h5 id="map-driver-name" class="mb-0 fw-bold" style="color: var(--text-primary);">-</h5>
                    <p id="map-driver-meta" class="mb-0 text-muted small">ID: - • Velocidad: 0 km/h</p>
                </div>
            </div>
            <div class="status-badge" id="map-driver-status" style="padding: 8px 16px; border-radius: 30px; font-weight: 600; font-size: 13px;">
                En Ruta
            </div>
        </div>
    </div>

    <!-- Controles de Mapa Flotantes (Lado derecho) -->
    <div style="position: absolute; top: 20px; right: 20px; z-index: 1000; display: flex; flex-direction: column; gap: 10px;">
        <button class="btn btn-white shadow-sm" onclick="mapaGlobal.zoomIn()" style="width: 45px; height: 45px; border-radius: 12px; background: var(--bg-surface); color: var(--text-primary); border: 1px solid var(--border-color);"><i class="bi bi-plus-lg"></i></button>
        <button class="btn btn-white shadow-sm" onclick="mapaGlobal.zoomOut()" style="width: 45px; height: 45px; border-radius: 12px; background: var(--bg-surface); color: var(--text-primary); border: 1px solid var(--border-color);"><i class="bi bi-dash-lg"></i></button>
        <button class="btn btn-white shadow-sm" onclick="initMapa()" style="width: 45px; height: 45px; border-radius: 12px; background: var(--bg-surface); color: var(--text-primary); border: 1px solid var(--border-color);"><i class="bi bi-crosshair"></i></button>
    </div>
</div>
