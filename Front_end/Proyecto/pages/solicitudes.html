<div class="row g-3 mb-4">
    <div class="col-md-12">
        <div class="card border-0 shadow-sm p-3 border-start border-primary border-4">
            <h5 class="mb-0">Registro de Solicitud de Viaje</h5>
            <small class="text-muted">Módulo Administrativo para ingreso de solicitudes</small>
        </div>
    </div>
</div>

<div class="card border-0 shadow-sm">
    <div class="card-body p-4">
        <form id="form-solicitud">
            <div class="row g-3">
                <div class="col-md-6">
                    <label class="form-label fw-semibold">Cliente / Solicitante</label>
                    <input type="text" class="form-control" placeholder="Nombre del cliente o empresa" required>
                </div>
                
                <div class="col-md-6">
                    <label class="form-label fw-semibold">Fecha de la Solicitud</label>
                    <input type="date" class="form-control" required>
                </div>

                <div class="col-md-6">
                    <label class="form-label fw-semibold">Origen</label>
                    <input type="text" class="form-control" placeholder="Lugar de partida" required>
                </div>
                
                <div class="col-md-6">
                    <label class="form-label fw-semibold">Destino</label>
                    <input type="text" class="form-control" placeholder="Lugar de llegada" required>
                </div>

                <div class="col-md-12">
                    <label class="form-label fw-semibold">Descripción de la Solicitud</label>
                    <textarea class="form-control" rows="3" placeholder="Detalles de la carga, requerimientos especiales, etc." required></textarea>
                </div>

                <div class="col-md-4">
                    <label class="form-label fw-semibold">Tipo de Vehículo Requerido</label>
                    <select class="form-select">
                        <option value="">Seleccione una opción...</option>
                        <option value="liviano">Liviano</option>
                        <option value="pesado">Pesado</option>
                        <option value="refrigerado">Refrigerado</option>
                    </select>
                </div>

                <div class="col-md-4">
                    <label class="form-label fw-semibold">Estado de la Solicitud</label>
                    <select class="form-select">
                        <option value="pendiente" selected>Pendiente</option>
                        <option value="aprobada">Aprobada</option>
                        <option value="en_curso">En Curso</option>
                    </select>
                </div>
                
                <div class="col-md-4">
                    <label class="form-label fw-semibold">Prioridad</label>
                    <select class="form-select">
                        <option value="baja">Baja</option>
                        <option value="media" selected>Media</option>
                        <option value="alta">Alta</option>
                    </select>
                </div>
            </div>

            <hr class="my-4">

            <div class="d-flex justify-content-end gap-2">
                <button type="reset" class="btn btn-light border">Limpiar</button>
                <button type="submit" class="btn btn-primary px-4"><i class="bi bi-save me-2"></i>Guardar Solicitud</button>
            </div>
        </form>
    </div>
</div>
