<div class="d-flex justify-content-between align-items-center mb-4">
    <h3 class="fw-bold">Gestión de Conductores</h3>
    <button class="btn btn-primary btn-open-modal">+ Nuevo Conductor</button>
</div>

<div id="listaConductores" class="driver-container">
    <div class="driver-row" onclick="seleccionarSoloUno(this)">
        <div class="driver-header">
            <div class="driver-avatar-square">
                <img src="https://images.unsplash.com/photo-1500648767791-00dcc994a43e?q=80&w=150&auto=format&fit=crop" alt="Pedro">
            </div>
            <div class="driver-main-info">
                <div class="info-item"><span class="label">Nombre</span><span class="value">Pedro de Prueba</span></div>
                <div class="info-item"><span class="label">Teléfono</span><span class="value">809-555-0011</span></div>
                <div class="info-item extra-data"><span class="label">Cédula</span><span class="value">402-1234567-8</span></div>
                <div class="info-item extra-data"><span class="label">Licencia</span><span class="value">99887766 (Cat. 03)</span></div>
            </div>
        </div>
        <div class="driver-details">
            <div class="bio-box">
                <span class="label">Información del Conductor</span>
                <p class="mb-0 mt-2 small text-muted">Este es el conductor de prueba estático para testear el diseño 80/20.</p>
            </div>
            <div class="status-box bg-status-activo">
                <span class="status-label">Estado</span>
                <span class="status-value">Activo</span>
            </div>
        </div>
    </div>
</div>

<div class="modal-overlay">
    <div class="modal-card">
        <h5 class="fw-bold mb-3">Nuevo Perfil de Conductor</h5>
        <form id="formConductor">
            <div class="row">
                <div class="col-md-4 text-center mb-3">
                    <div class="preview-box">
                        <img id="imgPreview" src="https://via.placeholder.com/150?text=Subir+Foto" alt="Preview">
                    </div>
                    <button type="button" class="btn btn-sm btn-outline-secondary mt-2" onclick="document.getElementById('fotoC').click()">Elegir Imagen</button>
                    <input type="file" id="fotoC" accept="image/*" style="display: none;">
                </div>
                <div class="col-md-8">
                    <div class="mb-2">
                        <label class="form-label small fw-bold">Nombre Completo</label>
                        <input type="text" id="nombreC" class="form-control" placeholder="Ej: Juan Pérez" required>
                    </div>
                    <div class="mb-2">
                        <label class="form-label small fw-bold">Teléfono</label>
                        <input type="text" id="telefonoC" class="form-control" placeholder="Ej: 809-555-0011" required>
                    </div>
                </div>
            </div>
            <div class="row">
                <div class="col-md-6 mb-2">
                    <label class="form-label small fw-bold">Cédula</label>
                    <input type="text" id="cedulaC" class="form-control" placeholder="Ej: 402-1234567-8" required>
                </div>
                <div class="col-md-6 mb-2">
                    <label class="form-label small fw-bold">N° Licencia</label>
                    <input type="text" id="numLicenciaC" class="form-control" placeholder="Ej: 980XXXX" required>
                </div>
            </div>
            <div class="row">
                <div class="col-md-6 mb-3">
                    <label class="form-label small fw-bold">Tipo de Licencia</label>
                    <select id="tipoLicenciaC" class="form-select">
                        <option value="Cat. 03">Cat. 03</option>
                        <option value="Cat. 04">Cat. 04</option>
                        <option value="Cat. 05">Cat. 05</option>
                    </select>
                </div>
                <div class="col-md-6 mb-3">
                    <label class="form-label small fw-bold">Estado</label>
                    <select id="estadoC" class="form-select">
                        <option value="Activo">Activo</option>
                        <option value="Inactivo">Inactivo</option>
                    </select>
                </div>
            </div>
            <div class="mb-3">
                <label class="form-label small fw-bold">Descripción / Información</label>
                <textarea id="descripcionC" class="form-control" rows="3"></textarea>
            </div>
            <div class="d-flex justify-content-end gap-2">
                <button type="button" class="btn btn-light btn-close-modal">Cancelar</button>
                <button type="submit" class="btn btn-primary px-4">Guardar</button>
            </div>
        </form>
    </div>
</div>

<script src="js/drivers.js"></script>
