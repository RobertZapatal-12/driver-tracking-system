<div class="d-flex justify-content-between mb-3">
    <h3>Conductores</h3>
    <button class="btn btn-primary btn-open-modal">+ Nuevo Conductor</button>
</div>

<div class="card border-0 shadow-sm p-3">
    <p>Gestiona aquí la información del personal y sus licencias.</p>
    <table class="table" id="tablaConductores">
        <thead>
            <tr>
                <th>Nombre</th>
                <th>Telefono</th>
                <th>Numero de licencia</th>
                <th>Tipo de licencia</th>
                <th>Cédula</th>
                <th>Estado</th>
            </tr>
        </thead>
        <tbody>
            <tr>
                <td>Carlos Ruiz</td>
                <td>829-555-1234</td>
                <td>102030</td>
                <td>Tipo B</td>
                <td>123456789</td>
                <td>Activo</td>
            </tr>
        </tbody>
    </table>
</div>

<div class="modal-overlay">
    <div class="modal-card">
        <h5>Agregar Conductor</h5>
        <hr>
        <form id="formConductor">
            <div class="mb-3">
                <label class="form-label">Nombre</label>
                <input type="text" id="nombreC" class="form-control" required>
            </div>
            <div class="mb-3">
                <label class="form-label">Telefono</label>
                <input type="text" id="telefonoC" class="form-control" required>
            </div>
            <div class="mb-3">
                <label class="form-label">Numero de Licencia</label>
                <input type="text" id="numLicenciaC" class="form-control" required>
            </div>
            <div class="mb-3">
                <label class="form-label">Tipo de Licencia</label>
                <input type="text" id="tipoLicenciaC" class="form-control" required>
            </div>
            <div class="mb-3">
                <label class="form-label">Cédula</label>
                <input type="text" id="cedulaC" class="form-control" required>
            </div>
            <div class="mb-3">
                <label class="form-label">Estado</label>
                <select id="estadoC" class="form-select" required>
                    <option value="Activo">Activo</option>
                    <option value="Inactivo">Inactivo</option>
                </select>
            </div>
            <div class="d-flex justify-content-end gap-2">
                <button type="button" class="btn btn-light btn-close-modal">Cancelar</button>
                <button type="submit" class="btn btn-success">Guardar</button>
            </div>
        </form>
    </div>
</div>
