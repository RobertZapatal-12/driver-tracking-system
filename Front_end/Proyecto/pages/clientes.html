<div class="clients-module">
    <!-- Encabezado con estadísticas rápidas -->
    <div class="glass-panel p-4 mb-4">
        <div class="d-flex justify-content-between align-items-center">
            <div>
                <h4 class="fw-bold mb-1">Cartera de Clientes corporativos</h4>
                <p class="text-muted small mb-0">Gestione la base de datos de empresas y clientes individuales.</p>
            </div>
            <button class="btn btn-primary rounded-pill px-4 btn-open-modal">
                <i class="bi bi-person-plus-fill me-2"></i> Registrar Cliente
            </button>
        </div>
    </div>

    <!-- Filtros y Búsqueda -->
    <div class="glass-panel p-3 mb-4">
        <div class="row g-3">
            <div class="col-md-8">
                <div class="input-group">
                    <span class="input-group-text bg-transparent border-end-0"><i class="bi bi-search"></i></span>
                    <input type="text" id="buscadorClientes" class="form-control border-start-0" placeholder="Buscar por nombre, RNC/Cédula, teléfono o correo...">
                </div>
            </div>
            <div class="col-md-4">
                <select class="form-select" id="filtroEstadoCliente">
                    <option value="">Todos los estados</option>
                    <option value="Activo">Solo Activos</option>
                    <option value="Inactivo">Inactivos</option>
                </select>
            </div>
        </div>
    </div>

    <!-- Lista de Clientes -->
    <div id="listaClientes" class="row g-4">
        <!-- Render dinámico aquí -->
        <div class="col-12 text-center py-5">
            <div class="spinner-border text-primary" role="status"></div>
            <p class="mt-2 text-muted">Cargando base de datos de clientes...</p>
        </div>
    </div>

    <!-- Paginación -->
    <div id="paginacionClientes" class="d-flex justify-content-center gap-2 mt-4"></div>
</div>

<!-- Modal de Cliente Moderno -->
<div class="modal-overlay">
    <div class="modal-card" style="max-width: 600px;">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h5 class="fw-bold mb-0">Perfil de Cliente</h5>
            <button class="btn-close btn-close-modal"></button>
        </div>
        
        <form id="formCliente">
            <div class="row g-3">
                <div class="col-md-8">
                    <label class="form-label small fw-bold">Nombre o Razón Social</label>
                    <input type="text" id="nombreCliente" class="form-control" placeholder="Ej: Distribuidora Nacional S.A." required>
                </div>
                <div class="col-md-4">
                    <label class="form-label small fw-bold">Estado</label>
                    <select id="estadoCliente" class="form-select">
                        <option value="Activo">Activo</option>
                        <option value="Inactivo">Inactivo</option>
                    </select>
                </div>
                
                <div class="col-md-6">
                    <label class="form-label small fw-bold">Cédula / RNC</label>
                    <input type="text" id="cedulaCliente" class="form-control" placeholder="000-0000000-0" required>
                </div>
                <div class="col-md-6">
                    <label class="form-label small fw-bold">Teléfono de contacto</label>
                    <input type="text" id="telefonoCliente" class="form-control" placeholder="809-000-0000" required>
                </div>

                <div class="col-md-12">
                    <label class="form-label small fw-bold">Correo Electrónico (Facturación)</label>
                    <input type="email" id="emailCliente" class="form-control" placeholder="admin@empresa.com" required>
                </div>

                <div class="col-md-12">
                    <label class="form-label small fw-bold">Dirección Fiscal / Entrega</label>
                    <textarea id="direccionCliente" class="form-control" rows="2" placeholder="Calle, Número, Sector, Ciudad..."></textarea>
                </div>
            </div>

            <div class="mt-4 pt-3 border-top d-flex justify-content-end gap-2">
                <button type="button" class="btn btn-light btn-close-modal px-4">Cerrar</button>
                <button type="submit" class="btn btn-primary px-5 rounded-pill">Guardar Cliente</button>
            </div>
        </form>
    </div>
</div>
