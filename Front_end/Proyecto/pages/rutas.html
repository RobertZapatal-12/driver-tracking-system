<div class="card shadow-sm border-0">
    <div class="card-body">
        <div class="d-flex justify-content-between mb-4">
            <h4>Planificación de Rutas</h4>
            <button class="btn btn-primary btn-open-modal">+ Nueva Ruta</button>
        </div>

        <div class="table-responsive">
            <table class="table align-middle">
                <thead class="table-light">
                    <tr>
                        <th>Route ID</th>
                        <th>User ID</th>
                        <th>Vehicle ID</th>
                        <th>Driver ID</th>
                        <th>Conductor</th>
                        <th>Origen</th>
                        <th>Destino</th>
                        <th>Fecha</th>
                        <th>Estado</th>
                    </tr>
                </thead>
                <tbody id="routes-table-body">
                </tbody>
            </table>
        </div>
    </div>
</div>

<div class="modal-overlay">
    <div class="modal-card">
        <h5>Registrar Nueva Ruta</h5>
        <hr>

        <form id="routeForm">
            <input type="number" id="vehicle_id" class="form-control mb-3" placeholder="ID del Vehículo" required>

            <input type="text" id="origen" class="form-control mb-3" placeholder="Punto de Origen" required>

            <input type="text" id="destino" class="form-control mb-3" placeholder="Punto de Destino" required>

            <div class="d-flex justify-content-end gap-2">
                <button type="button" class="btn btn-light btn-close-modal">Cerrar</button>
                <button type="button" class="btn btn-primary" onclick="crearRuta()">Crear Ruta</button>
            </div>
        </form>
    </div>
</div>
