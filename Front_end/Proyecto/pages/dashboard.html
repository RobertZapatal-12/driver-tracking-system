<div class="admin-dashboard container-fluid p-0">
    <!-- Fila de KPI Principales -->
    <div class="row g-4 mb-4">
        <div class="col-md-3">
            <div class="stats-card glass-panel p-4" style="border-left: 5px solid #3b82f6;">
                <div class="d-flex justify-content-between align-items-center mb-3">
                    <p class="text-muted small mb-0 fw-bold">SERVICIOS HOY</p>
                    <div class="icon-box bg-primary-light rounded-circle d-flex align-items-center justify-content-center flex-shrink-0" style="background: #eff6ff; width: 48px; height: 48px;">
                        <i class="bi bi-truck text-primary fs-4"></i>
                    </div>
                </div>
                <h2 class="mb-2 fw-bold" id="kpi-servicios-hoy"><span class="spinner-border spinner-border-sm text-primary"></span></h2>
                <div class="small" id="kpi-servicios-hoy-sub">
                    <span class="text-muted">Cargando...</span>
                </div>
            </div>
        </div>
        <div class="col-md-3">
            <div class="stats-card glass-panel p-4" style="border-left: 5px solid #10b981;">
                <div class="d-flex justify-content-between align-items-center mb-3">
                    <p class="text-muted small mb-0 fw-bold">INGRESOS (MES)</p>
                    <div class="icon-box bg-success-light rounded-circle d-flex align-items-center justify-content-center flex-shrink-0" style="background: #ecfdf5; width: 48px; height: 48px;">
                        <i class="bi bi-cash-stack text-success fs-4"></i>
                    </div>
                </div>
                <h2 class="mb-2 fw-bold text-nowrap" id="kpi-ingresos-mes">RD$ 0</h2>
                <div class="small" id="kpi-ingresos-mes-sub">
                    <span class="text-muted">Calculando ingresos...</span>
                </div>
            </div>
        </div>
        <div class="col-md-3">
            <div class="stats-card glass-panel p-4" style="border-left: 5px solid #f59e0b;">
                <div class="d-flex justify-content-between align-items-center mb-3">
                    <p class="text-muted small mb-0 fw-bold">CHOFERES ACTIVOS</p>
                    <div class="icon-box bg-warning-light rounded-circle d-flex align-items-center justify-content-center flex-shrink-0" style="background: #fffbeb; width: 48px; height: 48px;">
                        <i class="bi bi-person-badge text-warning fs-4"></i>
                    </div>
                </div>
                <h2 class="mb-2 fw-bold" id="kpi-choferes-activos"><span class="spinner-border spinner-border-sm text-warning"></span></h2>
                <div class="small text-muted" id="kpi-choferes-activos-sub">
                    Cargando...
                </div>
            </div>
        </div>
        <div class="col-md-3" onclick="mostrarMenuAlertas()" style="cursor: pointer;">
            <div class="stats-card glass-panel p-4" style="border-left: 5px solid #ef4444;">
                <div class="d-flex justify-content-between align-items-center mb-3">
                    <p class="text-muted small mb-0 fw-bold">ALERTAS CRÍTICAS</p>
                    <div class="icon-box bg-danger-light rounded-circle d-flex align-items-center justify-content-center flex-shrink-0" style="background: #fef2f2; width: 48px; height: 48px;">
                        <i class="bi bi-bell-fill text-danger fs-4"></i>
                    </div>
                </div>
                <h2 class="mb-2 fw-bold" id="kpi-alertas-criticas"><span class="spinner-border spinner-border-sm text-danger"></span></h2>
                <div class="small text-danger fw-bold" id="kpi-alertas-criticas-sub">
                    Cargando alertas...
                </div>
            </div>
        </div>
    </div>

    <div class="row g-4">
        <!-- Panel de Servicios Recientes -->
        <div class="col-md-8">
            <div class="glass-panel p-4 h-100">
                <div class="d-flex justify-content-between align-items-center mb-4">
                    <h5 class="fw-bold mb-0">Últimos Servicios Solicitados</h5>
                    <button class="btn btn-primary btn-sm rounded-pill px-3" onclick="cargarPagina('rutas')">Nuevo Servicio</button>
                </div>
                <div class="table-responsive">
                    <table class="table table-hover align-middle">
                        <thead class="text-muted small">
                            <tr>
                                <th>CLIENTE</th>
                                <th>RUTA (ORIGEN/DESTINO)</th>
                                <th>CHOFER</th>
                                <th>ESTADO</th>
                                <th>FECHA</th>
                            </tr>
                        </thead>
                        <tbody id="dashboard-recent-services">
                            <tr>
                                <td colspan="5" class="text-center py-4 text-muted">
                                    <div class="spinner-border spinner-border-sm me-2" role="status"></div>
                                    Cargando servicios recientes...
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>

        <div class="col-md-4">
            <div class="glass-panel p-4 h-100">
                <h5 class="fw-bold mb-4">Estado de la Flota</h5>
                <div id="dashboard-fleet-state">
                    <div class="text-center py-4 text-muted">Cargando estado...</div>
                </div>
            </div>
        </div>
    </div>
</div>
