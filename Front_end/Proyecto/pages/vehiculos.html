<div class="d-flex justify-content-between mb-3">
    <h3>Listado de Unidades</h3>
    <button id="btnAbrir" class="btn btn-primary">+ Nuevo Vehículo</button>
</div>
<table class="table bg-white shadow-sm rounded">
    <thead><tr><th>Placa</th><th>Marca</th><th>Estado</th></tr></thead>
    <tbody><tr><td>ABC-123</td><td>Toyota</td><td><span class="badge bg-success">Libre</span></td></tr></tbody>
</table>

<div id="modalGenerico" class="modal-simple">
    <div class="modal-simple-content">
        <h5>Agregar Vehículo</h5>
        <input type="text" class="form-control mb-2" placeholder="Placa">
        <input type="text" class="form-control mb-3" placeholder="Marca">
        <button class="btn btn-success w-100">Guardar</button>
        <button id="btnCerrar" class="btn btn-link w-100 text-muted">Cancelar</button>
    </div>
</div>
