<!-- =========================================================
     ENCABEZADO DEL MÓDULO DE HISTORIAL
     ========================================================= -->
<div class="d-flex justify-content-between align-items-center mb-4">
    <h3 class="fw-bold"><i class="bi bi-clock-history me-2 text-primary"></i>Historial Global de Viajes</h3>
</div>

<!-- =========================================================
     FILTROS Y BÚSQUEDA
     ========================================================= -->
<div class="card shadow-sm border-0 mb-4" style="border-radius: var(--radius-lg);">
    <div class="card-body p-4">
        <div class="row g-3">
            <div class="col-md-3">
                <label class="form-label small fw-bold">Buscar</label>
                <input type="text" id="buscadorHistorial" class="form-control" placeholder="Ruta, código o conductor...">
            </div>
            <div class="col-md-3">
                <label class="form-label small fw-bold">Conductor</label>
                <select id="filtroDriverHistorial" class="form-select">
                    <option value="">Todos los conductores</option>
                    <!-- Opciones cargadas dinámicamente -->
                </select>
            </div>
            <div class="col-md-3">
                <label class="form-label small fw-bold">Desde</label>
                <input type="date" id="filtroDesdeHistorial" class="form-control">
            </div>
            <div class="col-md-3">
                <label class="form-label small fw-bold">Hasta</label>
                <input type="date" id="filtroHastaHistorial" class="form-control">
            </div>
            <div class="col-12 d-flex justify-content-end gap-2 mt-3">
                <button class="btn btn-light" onclick="limpiarFiltrosHistorial()">Limpiar Filtros</button>
            </div>
        </div>
    </div>
</div>

<!-- =========================================================
     TABLA DE HISTORIAL
     ========================================================= -->
<div class="card shadow-sm border-0" style="border-radius: var(--radius-lg); overflow: hidden;">
    <div class="table-responsive">
        <table class="table table-hover align-middle mb-0" id="tablaHistorial">
            <thead>
                <tr>
                    <th>Fecha</th>
                    <th>Conductor</th>
                    <th>Origen</th>
                    <th>Destino</th>
                    <th>Código</th>
                    <th>Notas</th>
                </tr>
            </thead>
            <tbody>
                <!-- Contenido dinámico -->
            </tbody>
        </table>
    </div>
</div>

<!-- PAGINACIÓN -->
<div id="paginacionHistorial" class="d-flex justify-content-center gap-2 mt-4"></div>
