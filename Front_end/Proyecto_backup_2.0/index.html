<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TransFleet | Gestión Logística</title>

    <!-- Google Fonts: Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">

    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />

    <!-- Estilos -->
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/vehiculos.css" />
</head>
<body class="saas-body">

    <!-- Modern SaaS Header Architecture -->
    <header class="saas-header">
        <div class="header-top">
            <div class="header-container container-xl">
                <div class="logo-area">
                    <div class="logo-icon"><i class="bi bi-truck"></i></div>
                    <span class="logo-text">TransFleet</span>
                </div>
                
                <div class="header-actions">
                    <div class="global-search d-none d-md-flex">
                        <i class="bi bi-search"></i>
                        <input type="text" placeholder="Buscar rutas, conductores...">
                    </div>
                    <button class="action-btn"><i class="bi bi-bell"></i></button>
                    <div class="user-profile">
                        <div class="avatar"><i class="bi bi-person"></i></div>
                        <span class="user-name">Admin Usuario</span>
                    </div>
                </div>
            </div>
        </div>

        <div class="header-nav-wrapper">
            <div class="header-container container-xl">
                <!-- We inject the navigation here dynamically via app.js -->
                <nav id="sidebar" class="saas-nav"></nav>
            </div>
        </div>
    </header>

    <!-- Main Content Area -->
    <div class="main-wrapper">
        <div class="container-xl">
            <div class="page-heading">
                <h2 id="page-title" class="fw-bold m-0">Dashboard</h2>
                <div class="breadcrumb text-muted fs-6">Gestión Logística / <span id="breadcrumb-current">Dashboard</span></div>
            </div>
            
            <main id="contenido" class="content-area"></main>
        </div>
    </div>

    <!-- Footer -->
    <footer class="saas-footer">
        <div class="container-xl text-center text-muted">
            <p class="mb-0">&copy; 2026 TransFleet System. Todos los derechos reservados.</p>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <!-- Scripts del proyecto -->
    <script src="js/drivers.js"></script>
    <script src="js/vehiculos.js"></script>
    <script src="js/app.js"></script>
    <script src="js/rutas.js"></script>
</body>
</html>
